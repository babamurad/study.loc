  <circle cx="180" cy="140" r="15" fill="#FFBD2E" />
  <circle cx="220" cy="140" r="15" fill="#27C93F" />

  <path d="M140 250L190 300L140 350" stroke="#FF5722" stroke-width="30" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M372 250L322 300L372 350" stroke="#2196F3" stroke-width="30" stroke-linecap="round" stroke-linejoin="round" />
  
  <path class="adaptive-stroke" d="M280 220L230 380" stroke-width="30" stroke-linecap="round" />
</svg>
