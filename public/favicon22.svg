<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    /* По умолчанию темный цвет для светлой темы */
    .adaptive-stroke { stroke: #1A2B48; }
    .adaptive-fill { fill: #1A2B48; }

    /* Если у пользователя включена темная тема */
    @media (prefers-color-scheme: dark) {
      .adaptive-stroke { stroke: #F0F0F0; }
      .adaptive-fill { fill: #F0F0F0; }
    }
  </style>

  <path class="adaptive-fill" d="M100 120C100 108.954 108.954 100 120 100H392C403.046 100 412 108.954 412 120V180H100V120Z" />
  
  <path class="adaptive-stroke" d="M100 180V412H412V180" stroke-width="30" stroke-linejoin="round" />

