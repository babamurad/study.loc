<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #1a202c; font-family: 'Montserrat', sans-serif; padding: 40px; color: white; display: flex; flex-direction: column; align-items: center; }
        .title { margin-bottom: 30px; font-size: 20px; color: #a0aec0; text-transform: uppercase; letter-spacing: 1px; }
        .grid { display: flex; gap: 30px; align-items: center; position: relative; }
        .file-box { background: #2d3748; border: 2px solid #4a5568; border-radius: 12px; padding: 20px; width: 180px; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .css-box { background: #1e293b; border: 2px solid #4f46e5; border-radius: 12px; padding: 20px; width: 180px; text-align: center; box-shadow: 0 10px 20px rgba(79, 70, 229, 0.2); margin-top: 40px; }
        .file-name { font-weight: bold; color: #f59e0b; font-size: 16px; margin-bottom: 5px; }
        .css-name { font-weight: bold; color: #6366f1; font-size: 16px; margin-bottom: 5px; }
        .desc { font-size: 12px; color: #a0aec0; }
        .line { font-size: 24px; color: #4f46e5; font-weight: bold; }
    </style>
</head>
<body>
    <div class="title">Архитектура твоего финального проекта</div>
    <div class="grid">
        <div class="file-box">
            <div class="file-name">index.html</div>
            <div class="desc">Главная страница проекта</div>
        </div>
        <div class="line">↔</div>
        <div class="file-box">
            <div class="file-name">about.html</div>
            <div class="desc">Страница «О себе» / «О теме»</div>
        </div>
        <div class="line">↔</div>
        <div class="file-box">
            <div class="file-name">contacts.html</div>
            <div class="desc">Страница с валидной HTML-формой</div>
        </div>
    </div>
    <div class="css-box">
        <div class="css-name">style.css</div>
        <div class="desc">Один общий файл стилей для всех страниц</div>
    </div>
</body>
</html>
