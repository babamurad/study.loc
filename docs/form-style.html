<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация · Стильная форма</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            max-width: 520px;
            width: 100%;
            background: white;
            border-radius: 32px;
            padding: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            transition: transform 0.2s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }

        .sub {
            color: #64748b;
            margin-bottom: 28px;
            border-left: 3px solid #764ba2;
            padding-left: 12px;
        }

        label {
            display: block;
            font-weight: 500;
            margin-top: 16px;
            margin-bottom: 6px;
            color: #1e293b;
        }

        input,
        select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #cbd5e1;
            border-radius: 20px;
            font-family: inherit;
            transition: 0.2s;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: #764ba2;
            box-shadow: 0 0 0 3px rgba(118, 75, 162, 0.2);
        }

        .radio-group,
        .checkbox-group {
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
            margin-top: 8px;
        }

        .radio-group label,
        .checkbox-group label {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-weight: normal;
            margin: 0;
        }

        button {
            margin-top: 28px;
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.2);
        }

        .reset-btn {
            background: #e2e8f0;
            color: #1e293b;
            margin-top: 12px;
        }

        .reset-btn:hover {
            background: #cbd5e1;
            transform: none;
        }

        .error-msg {
            color: #e11d48;
            font-size: 12px;
            margin-top: 4px;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>Создать аккаунт</h1>
        <div class="sub">Пожалуйста, заполните все обязательные поля</div>

        <form>
            <label for="name">Имя *</label>
            <input type="text" id="name" required placeholder="Иван">

            <label for="email">Email *</label>
            <input type="email" id="email" required placeholder="ivan@example.com">

            <label for="password">Пароль (мин. 8 символов) *</label>
            <input type="password" id="password" minlength="8" required>

            <label>Пол *</label>
            <div class="radio-group">
                <label><input type="radio" name="gender" value="male" required> Мужской</label>
                <label><input type="radio" name="gender" value="female"> Женский</label>
                <label><input type="radio" name="gender" value="other"> Другой</label>
            </div>

            <label for="city">Город</label>
            <select id="city">
                <option>Москва</option>
                <option>Санкт-Петербург</option>
                <option>Казань</option>
            </select>

            <div class="checkbox-group" style="margin-top: 16px;">
                <label><input type="checkbox" required> Я согласен с правилами обработки данных *</label>
            </div>

            <button type="submit">Зарегистрироваться</button>
            <button type="reset" class="reset-btn">Очистить форму</button>
        </form>
    </div>
</body>

</html>
