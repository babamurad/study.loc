<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <style>
        body { background-color: #1a202c; font-family: sans-serif; display: flex; justify-content: center; gap: 40px; padding: 60px; }
        .preview-box { text-align: center; color: #a0aec0; font-size: 14px; }
        .game-card { width: 240px; background: #2d3748; border: 1px solid #4a5568; border-radius: 12px; padding: 20px; box-sizing: border-box; text-align: center; color: white; }
        .game-cover { height: 100px; background: #4f46e5; border-radius: 8px; margin-bottom: 15px; }
        button { width: 100%; padding: 10px; background: #10b981; color: white; border: none; border-radius: 6px; font-weight: bold; }
        
        /* Эффекты для правой карточки (имитация hover) */
        .hovered { transition: all 0.3s ease; background: #313d52; box-shadow: 0 10px 25px rgba(16, 185, 129, 0.2); border-color: #10b981; }
        .hovered button { background: #12d795; padding: 12px 10px; }
    </style>
</head>
<body>
    <div class="preview-box">
        <p>Обычное состояние</p>
        <div class="game-card">
            <div class="game-cover"></div>
            <h3 style="margin:0 0 15px 0;">Minecraft</h3>
            <button>Купить</button>
        </div>
    </div>
    <div class="preview-box">
        <p>При наведении (Hover)</p>
        <div class="game-card hovered">
            <div class="game-cover" style="background:#6366f1"></div>
            <h3 style="margin:0 0 15px 0; color:#10b981;">Minecraft</h3>
            <button>Купить</button>
        </div>
    </div>
</body>
</html>
