<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #1a202c; font-family: 'Montserrat', sans-serif; padding: 40px; color: white; display: flex; flex-direction: column; align-items: center; }
        .window { background: #ffffff; width: 480px; border-radius: 4px; border: 1px solid #cbd5e1; box-shadow: 0 10px 25px rgba(0,0,0,0.2); overflow: hidden; color: #1f2937; position: relative; height: 280px; }
        .header { background: #f1f5f9; padding: 0 0 0 15px; font-size: 12px; color: #64748b; display: flex; justify-content: space-between; align-items: center; height: 32px; border-bottom: 1px solid #e2e8f0; }
        .win-controls { display: flex; height: 100%; }
        .win-btn { width: 46px; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 12px; color: #64748b; font-family: sans-serif; }
        .win-btn.close:hover { background-color: #e81123; color: white; }
        .win-btn:not(.close):hover { background-color: #e2e8f0; }
        .content { padding: 20px; text-align: center; display: flex; justify-content: center; align-items: center; height: calc(100% - 32px); box-sizing: border-box; }
        
        /* Имитация открытого Pop-up внутри макета страницы */
        .mock-overlay { position: absolute; top: 32px; left: 0; width: 100%; height: calc(100% - 32px); background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; }
        .mock-box { background: white; padding: 25px; border-radius: 8px; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.3); width: 280px; }
        .mock-box h3 { margin: 0 0 15px 0; font-size: 16px; color: #1e293b; }
        .mock-close { background: #ef4444; color: white; border: none; padding: 8px 16px; font-size: 12px; font-weight: bold; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <p style="color: #94a3b8; margin-bottom: 20px;">Внешний вид открытого окна (Overlay + Box)</p>
    <div class="window">
        <div class="header">
            <span>Демонстрация Pop-up</span>
            <div class="win-controls">
                <div class="win-btn">─</div>
                <div class="win-btn">🗖</div>
                <div class="win-btn close">✕</div>
            </div>
        </div>
        <div class="content">
            <button style="padding: 10px 20px; opacity: 0.3; background: #4f46e5; color: white; border: none; border-radius: 4px;">Открыть окно</button>
            <div class="mock-overlay">
                <div class="mock-box">
                    <h3>Ура, это модалка!</h3>
                    <button class="mock-close">Закрыть</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
