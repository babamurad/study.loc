<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Регистрация на курсы</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #0f2027, #203a43, #2c5364);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .form-card {
            max-width: 520px;
            width: 100%;
            background: white;
            border-radius: 32px;
            padding: 32px;
            box-shadow: 0 30px 40px rgba(0,0,0,0.3);
            transition: 0.2s;
        }
        .form-card:hover {
            transform: translateY(-3px);
        }
        h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #0f2027, #2c5364);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .sub {
            color: #5b6e8c;
            margin-bottom: 24px;
            border-left: 3px solid #2c5364;
            padding-left: 12px;
        }
        label {
            display: block;
            font-weight: 500;
            margin: 18px 0 6px 0;
            color: #1e2a3a;
        }
        input, .radio-group {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #cbd5e1;
            border-radius: 28px;
            font-family: inherit;
            transition: 0.2s;
        }
        input:focus {
            outline: none;
            border-color: #2c5364;
            box-shadow: 0 0 0 3px rgba(44,83,100,0.2);
        }
        .radio-group {
            display: flex;
            gap: 20px;
            background: transparent;
            border: none;
            padding: 0;
        }
        .radio-group label {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-weight: normal;
            margin: 0;
        }
        .checkbox-label {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin: 20px 0;
            font-weight: normal;
            cursor: pointer;
        }
        .checkbox-label input[type="checkbox"] {
            width: auto;
            margin-top: 3px;
            flex-shrink: 0;
        }
        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-submit {
            background: linear-gradient(90deg, #0f2027, #2c5364);
            color: white;
            margin-top: 10px;
        }
        .btn-submit:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 14px rgba(0,0,0,0.2);
        }
        .btn-reset {
            background: #e9ecef;
            color: #1e2a3a;
            margin-top: 12px;
        }
        .btn-reset:hover {
            background: #dee2e6;
        }
    </style>
</head>
<body>
<div class="form-card">
    <h1>Запись на курс</h1>
    <div class="sub">Стань востребованным специалистом</div>

    <form>
        <label for="fullname">Ваше имя *</label>
        <input type="text" id="fullname" required placeholder="Анна Смирнова">

        <label for="email">Email *</label>
        <input type="email" id="email" required placeholder="anna@example.com">

        <label for="pass">Пароль (мин. 8 символов) *</label>
        <input type="password" id="pass" minlength="8" required>

        <label>Направление *</label>
        <div class="radio-group">
            <label><input type="radio" name="course" value="front" required> Frontend</label>
            <label><input type="radio" name="course" value="back"> Backend</label>
            <label><input type="radio" name="course" value="design"> Design</label>
        </div>

        <label class="checkbox-label">
            <input type="checkbox" required> Я согласен с правилами обработки данных *
        </label>

        <button type="submit" class="btn-submit">Отправить заявку</button>
        <button type="reset" class="btn-reset">Очистить форму</button>
    </form>
</div>
</body>
</html>
