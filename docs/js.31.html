<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #1a202c; font-family: 'Montserrat', sans-serif; padding: 40px; color: white; display: flex; justify-content: center; gap: 40px; }
        .window { width: 300px; border-radius: 4px; border: 1px solid #cbd5e1; box-shadow: 0 10px 25px rgba(0,0,0,0.2); overflow: hidden; height: 180px; }
        .header { padding: 0 0 0 15px; font-size: 11px; display: flex; justify-content: space-between; align-items: center; height: 32px; border-bottom: 1px solid #e2e8f0; }
        .win-controls { display: flex; height: 100%; }
        .win-btn { width: 35px; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-family: sans-serif; }
        .content { padding: 20px; text-align: center; height: calc(100% - 32px); box-sizing: border-box; }
        
        /* Светлый макет */
        .light-win { background: #ffffff; color: #1f2937; border-color: #cbd5e1; }
        .light-win .header { background: #f1f5f9; color: #64748b; }
        .light-win .win-btn { color: #64748b; }
        
        /* Темный макет */
        .dark-win { background: #1a202c; color: #ffffff; border-color: #4a5568; }
        .dark-win .header { background: #1e293b; color: #94a3b8; border-bottom-color: #4a5568; }
        .dark-win .win-btn { color: #94a3b8; }

        button { background: #4f46e5; color: white; border: none; padding: 6px 14px; font-size: 11px; font-weight: bold; border-radius: 4px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <div>
        <p style="color: #94a3b8; font-size: 12px; margin-bottom: 10px; text-align: center;">Светлая тема (Обычная)</p>
        <div class="window light-win">
            <div class="header">
                <span>Дневной режим</span>
                <div class="win-controls"><div class="win-btn">─</div><div class="win-btn">🗖</div><div class="win-btn">✕</div></div>
            </div>
            <div class="content">
                <h3 style="margin:0; font-size:14px;">Читать статью</h3>
                <button>🌙 Темная тема</button>
            </div>
        </div>
    </div>

    <div>
        <p style="color: #94a3b8; font-size: 12px; margin-bottom: 10px; text-align: center;">Темная тема (После клика)</p>
        <div class="window dark-win">
            <div class="header">
                <span>Ночной режим</span>
                <div class="win-controls"><div class="win-btn">─</div><div class="win-btn">🗖</div><div class="win-btn">✕</div></div>
            </div>
            <div class="content">
                <h3 style="margin:0; font-size:14px;">Читать статью</h3>
                <button style="background:#f59e0b; color:#1a202c;">☀️ Светлая тема</button>
            </div>
        </div>
    </div>
</body>
</html>
