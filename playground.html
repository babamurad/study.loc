<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Sandbox | Интерактивная песочница</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --panel-bg: #1e293b;
            --accent: #6366f1;
            --accent-hover: #818cf8;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        header {
            height: 60px;
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            z-index: 10;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 1.2rem;
            letter-spacing: -0.02em;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--accent), #a855f7);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.1rem;
        }

        .actions {
            display: flex;
            gap: 12px;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: var(--panel-bg);
            color: var(--text-main);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: #2d3a4f;
        }

        /* Main Layout */
        main {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        .editor-container {
            width: 50%;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
        }

        .preview-container {
            width: 50%;
            background: white;
            position: relative;
        }

        .pane-header {
            height: 40px;
            background: #1e293b;
            display: flex;
            align-items: center;
            padding: 0 16px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            justify-content: space-between;
        }

        #editor {
            flex: 1;
            width: 100%;
            height: 100%;
            background: #0f172a;
            color: #e2e8f0;
            font-family: 'Fira Code', monospace;
            font-size: 14px;
            line-height: 1.6;
            padding: 20px;
            border: none;
            resize: none;
            outline: none;
            tab-size: 4;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }

        /* Sidebar Snippets */
        .sidebar {
            width: 240px;
            background: var(--bg-dark);
            border-right: 1px solid var(--border);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            overflow-y: auto;
        }

        .sidebar h3 {
            font-size: 0.875rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .snippet-list {
            display: grid;
            gap: 8px;
        }

        .snippet-btn {
            background: var(--panel-bg);
            border: 1px solid var(--border);
            padding: 10px;
            border-radius: 8px;
            color: var(--text-main);
            text-align: left;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .snippet-btn:hover {
            border-color: var(--accent);
            background: rgba(99, 102, 241, 0.1);
        }

        .snippet-btn code {
            color: var(--accent);
            font-family: 'Fira Code', monospace;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            main { flex-direction: column; }
            .editor-container, .preview-container { width: 100%; height: 50%; }
            .sidebar { display: none; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">
        <a href="index.html" style="color: inherit; text-decoration: none; display: flex; align-items: center; gap: 10px;">
            <div class="logo-icon">&lt;/&gt;</div>
            Web Sandbox
        </a>
    </div>
    <div class="actions">
        <button class="btn btn-secondary" onclick="resetCode()">Сбросить</button>
        <button class="btn btn-primary" onclick="downloadCode()">Скачать .html</button>
    </div>
</header>

<main>
    <div class="sidebar">
        <h3>Теги для вставки</h3>
        <div class="snippet-list">
            <button class="snippet-btn" onclick="insertCode('<h1>Заголовок</h1>')">
                <code>&lt;h1&gt;</code> — Главный заголовок
            </button>
            <button class="snippet-btn" onclick="insertCode('<p>Текст абзаца...</p>')">
                <code>&lt;p&gt;</code> — Абзац текста
            </button>
            <button class="snippet-btn" onclick="insertCode('<ul>\n  <li>Пункт 1</li>\n  <li>Пункт 2</li>\n</ul>')">
                <code>&lt;ul&gt;</code> — Список
            </button>
            <button class="snippet-btn" onclick="insertCode('<img src=\'https://placehold.co/400x200\' alt=\'Описание\'>')">
                <code>&lt;img&gt;</code> — Картинка
            </button>
            <button class="snippet-btn" onclick="insertCode('<a href=\'#\'>Ссылка</a>')">
                <code>&lt;a&gt;</code> — Ссылка
            </button>
        </div>
    </div>

    <div class="editor-container">
        <div class="pane-header">Редактор HTML</div>
        <textarea id="editor" spellcheck="false" placeholder="Начни писать HTML здесь..."></textarea>
    </div>

    <div class="preview-container">
        <div class="pane-header">Предпросмотр</div>
        <iframe id="preview"></iframe>
    </div>
</main>

<script>
    const editor = document.getElementById('editor');
    const preview = document.getElementById('preview');

    const defaultCode = `<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        h1 { color: #4f46e5; }
    </style>
</head>
<body>
    <h1>Привет из песочницы! 🚀</h1>
    <p>Попробуй изменить этот текст в левой панели.</p>
</body>
</html>`;

    // Load from localStorage or use default
    const savedCode = localStorage.getItem('web-sandbox-code');
    editor.value = savedCode || defaultCode;

    function updatePreview() {
        const code = editor.value;
        const previewDoc = preview.contentDocument || preview.contentWindow.document;
        previewDoc.open();
        previewDoc.write(code);
        previewDoc.close();
        localStorage.setItem('web-sandbox-code', code);
    }

    editor.addEventListener('input', updatePreview);

    // Initial update
    updatePreview();

    // Helper functions
    function insertCode(snippet) {
        const start = editor.selectionStart;
        const end = editor.selectionEnd;
        const text = editor.value;
        editor.value = text.substring(0, start) + snippet + text.substring(end);
        editor.focus();
        editor.selectionStart = editor.selectionEnd = start + snippet.length;
        updatePreview();
    }

    function resetCode() {
        if (confirm('Сбросить весь код к начальному состоянию?')) {
            editor.value = defaultCode;
            updatePreview();
        }
    }

    function downloadCode() {
        const blob = new Blob([editor.value], { type: 'text/html' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'index.html';
        a.click();
        URL.revokeObjectURL(url);
    }

    // Handle Tab key
    editor.onkeydown = function(e) {
        if (e.key === 'Tab') {
            e.preventDefault();
            const start = this.selectionStart;
            const end = this.selectionEnd;
            this.value = this.value.substring(0, start) + "    " + this.value.substring(end);
            this.selectionStart = this.selectionEnd = start + 4;
        }
    };
</script>

</body>
</html>
